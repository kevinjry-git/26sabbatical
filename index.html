<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown to 12 June</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f8;
      --muted: #5a5a7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(40px, 40px);
      }
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232, 255, 71, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 56px;
      text-align: center;
      max-width: 540px;
      width: 92vw;
      box-shadow: 0 0 0 1px rgba(232, 255, 71, 0.05), 0 32px 80px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .label-top {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .label-top::before,
    .label-top::after {
      content: '';
      height: 1px;
      width: 32px;
      background: var(--border);
    }

    .big-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 22vw, 160px);
      line-height: 0.85;
      color: var(--accent);
      letter-spacing: -2px;
      position: relative;
      display: inline-block;
      animation: flicker 8s ease-in-out infinite;
    }

    @keyframes flicker {

      0%,
      95%,
      100% {
        text-shadow: 0 0 40px rgba(232, 255, 71, 0.3);
      }

      96% {
        text-shadow: 0 0 80px rgba(232, 255, 71, 0.7);
      }

      97% {
        text-shadow: 0 0 20px rgba(232, 255, 71, 0.1);
      }

      98% {
        text-shadow: 0 0 60px rgba(232, 255, 71, 0.5);
      }
    }

    .days-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 28px 0;
    }

    .target-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .target-date span {
      color: var(--accent2);
    }

    /* Live time breakdown */
    .breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 28px;
    }

    .unit {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 8px 10px;
    }

    .unit-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--accent);
      line-height: 1;
      display: block;
    }

    .unit-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
      display: block;
    }

    .done-message {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .progress-bar {
      margin-top: 24px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 1s linear;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="label-top">countdown</div>

    <div id="main-display">
      <div class="big-number" id="days-num">--</div>
      <div class="days-label">days to go</div>
    </div>

    <div class="divider"></div>

    <div class="target-date">12 <span>June</span> 2026</div>

    <div class="breakdown">
      <div class="unit">
        <span class="unit-val" id="hrs">--</span>
        <span class="unit-label">Hours</span>
      </div>
      <div class="unit">
        <span class="unit-val" id="mins">--</span>
        <span class="unit-label">Minutes</span>
      </div>
      <div class="unit">
        <span class="unit-val" id="secs">--</span>
        <span class="unit-label">Seconds</span>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span id="start-label">Today</span>
      <span>12 Jun</span>
    </div>
  </div>

  <script>
    const target = new Date('2026-06-12T15:00:00');
    // Use today as the "start" for progress calculation
    const start = new Date('2026-05-25T00:00:00');
    const totalMs = target - start;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('days-num').textContent = '0';
        document.getElementById('hrs').textContent = '00';
        document.getElementById('mins').textContent = '00';
        document.getElementById('secs').textContent = '00';
        document.getElementById('progress').style.width = '100%';
        return;
      }

      const totalSecs = Math.floor(diff / 1000);
      const days = Math.floor(totalSecs / 86400);
      const hrs = Math.floor((totalSecs % 86400) / 3600);
      const mins = Math.floor((totalSecs % 3600) / 60);
      const secs = totalSecs % 60;

      document.getElementById('days-num').textContent = days;
      document.getElementById('hrs').textContent = pad(hrs);
      document.getElementById('mins').textContent = pad(mins);
      document.getElementById('secs').textContent = pad(secs);

      const elapsed = now - start;
      const pct = Math.min(100, Math.max(0, (elapsed / totalMs) * 100));
      document.getElementById('progress').style.width = pct + '%';
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>

</html>
