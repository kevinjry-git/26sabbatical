<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdowns</title>
<link type="image/png" sizes="32x32" rel="icon" href="icons8-clock-glassmorphism-32.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrapper">
  <!-- SECRET TRIP -->
  <div class="card secret">
    <div class="event-label">Secret Trip</div>
    <div class="big-number" id="t-days">--</div>
    <div class="days-label">days to go</div>
    <div class="divider"></div>
    <div class="target-date">5 <em>June</em> 2026 · 2pm</div>
    <div class="breakdown">
      <div class="unit"><span class="unit-val" id="t-hrs">--</span><span class="unit-label">Hours</span></div>
      <div class="unit"><span class="unit-val" id="t-mins">--</span><span class="unit-label">Minutes</span></div>
      <div class="unit"><span class="unit-val" id="t-secs">--</span><span class="unit-label">Seconds</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="t-prog"></div></div>
    <div class="progress-label"><span>Today</span><span>5 Jun 14:00</span></div>
  </div>

  <!-- SABBATICAL -->
  <div class="card sabbatical">
    <div class="event-label">Sabbatical</div>
    <div class="big-number" id="s-days">--</div>
    <div class="days-label">days to go</div>
    <div class="divider"></div>
    <div class="target-date">12 <em>June</em> 2026 · 3pm</div>
    <div class="breakdown">
      <div class="unit"><span class="unit-val" id="s-hrs">--</span><span class="unit-label">Hours</span></div>
      <div class="unit"><span class="unit-val" id="s-mins">--</span><span class="unit-label">Minutes</span></div>
      <div class="unit"><span class="unit-val" id="s-secs">--</span><span class="unit-label">Seconds</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="s-prog"></div></div>
    <div class="progress-label"><span>Today</span><span>12 Jun 15:00</span></div>
  </div>


  <!-- FRANCE -->
  <div class="card france">
    <div class="event-label">France</div>
    <div class="big-number" id="f-days">--</div>
    <div class="days-label">days to go</div>
    <div class="divider"></div>
    <div class="target-date">4 <em>July</em> 2026 · 4pm</div>
    <div class="breakdown">
      <div class="unit"><span class="unit-val" id="f-hrs">--</span><span class="unit-label">Hours</span></div>
      <div class="unit"><span class="unit-val" id="f-mins">--</span><span class="unit-label">Minutes</span></div>
      <div class="unit"><span class="unit-val" id="f-secs">--</span><span class="unit-label">Seconds</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="f-prog"></div></div>
    <div class="progress-label"><span>Today</span><span>4 Jul</span></div>
  </div>

</div>

<script>
  const pad = n => String(n).padStart(2,'0');
  const now0 = new Date('2026-05-26T00:00:00');

  const targets = [
    { target: new Date('2026-06-05T14:00:00'), start: now0,
      days:'t-days', hrs:'t-hrs', mins:'t-mins', secs:'t-secs', prog:'t-prog' },
    { target: new Date('2026-06-12T15:00:00'), start: now0,
      days:'s-days', hrs:'s-hrs', mins:'s-mins', secs:'s-secs', prog:'s-prog' },
    { target: new Date('2026-07-04T16:00:00'), start: now0,
      days:'f-days', hrs:'f-hrs', mins:'f-mins', secs:'f-secs', prog:'f-prog' },
  ];

  function tick() {
    const now = new Date();
    targets.forEach(({ target, start, days, hrs, mins, secs, prog }) => {
      const diff = target - now;
      const totalMs = target - start;
      if (diff <= 0) {
        document.getElementById(days).textContent = '0';
        document.getElementById(hrs).textContent = '00';
        document.getElementById(mins).textContent = '00';
        document.getElementById(secs).textContent = '00';
        document.getElementById(prog).style.width = '100%';
        return;
      }
      const ts = Math.floor(diff / 1000);
      document.getElementById(days).textContent = Math.floor(ts / 86400);
      document.getElementById(hrs).textContent  = pad(Math.floor((ts % 86400) / 3600));
      document.getElementById(mins).textContent = pad(Math.floor((ts % 3600) / 60));
      document.getElementById(secs).textContent = pad(ts % 60);
      const pct = Math.min(100, Math.max(0, ((now - start) / totalMs) * 100));
      document.getElementById(prog).style.width = pct + '%';
    });
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
